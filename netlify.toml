[build]
  publish = "."

[[redirects]]
  from = "/"
  to = "/pages/home.html"
  status = 302

[[redirects]]
  from = "/home"
  to = "/pages/home.html"
  status = 200

[[redirects]]
  from = "/bonuses"
  to = "/pages/bonuses.html"
  status = 200

[[redirects]]
  from = "/leaderboard"
  to = "/pages/leaderboard.html"
  status = 200

[[redirects]]
  from = "/clan-wars"
  to = "/pages/clan-wars.html"
  status = 200

[[redirects]]
  from = "/partners"
  to = "/pages/partners.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/pages/admin-dashboard.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
